<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weijian Shi - Personal Homepage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Navigation -->
<nav id="navbar">
    <div class="nav-container">
        <a href="#home" class="nav-logo">Weijian Shi</a>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#research">Research</a></li>
            <li><a href="#awards">Awards</a></li>
            <li><a href="#publications">Publications</a></li>
            <li><a href="#blog">Blog</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <button id="theme-toggle" aria-label="Toggle theme">
            <i class="fas fa-moon"></i>
        </button>
        <button class="nav-toggle" aria-label="Menu">
            <i class="fas fa-bars"></i>
        </button>
    </div>
</nav>

<!-- Hero -->
<section id="home" class="hero">
    <div class="hero-content">
        <div class="hero-avatar">
            <img id="hero-avatar-img" src="avatar.jpg" alt="Avatar" onerror="this.src='https://ui-avatars.com/api/?name=WS&size=200&background=4f46e5&color=fff&rounded=true'">
        </div>
        <h1 id="hero-name"></h1>
        <p class="hero-title" id="hero-title"></p>
        <p class="hero-desc" id="hero-subtitle"></p>
        <div class="hero-links" id="hero-links"></div>
    </div>
</section>

<!-- About -->
<section id="about" class="section">
    <div class="container">
        <h2 class="section-title">About Me</h2>
        <div class="about-grid">
            <div class="about-text" id="about-bio"></div>
            <div class="about-info">
                <h3>Education</h3>
                <div class="timeline" id="about-education"></div>
            </div>
        </div>
        <h3 class="skills-title">Skills</h3>
        <div class="skills" id="about-skills"></div>
    </div>
</section>

<!-- Research Interests -->
<section id="research" class="section section-alt">
    <div class="container">
        <h2 class="section-title">Research Interests</h2>
        <div class="research-grid" id="research-grid"></div>
    </div>
</section>

<!-- Awards & Honors -->
<section id="awards" class="section">
    <div class="container">
        <h2 class="section-title">Awards &amp; Honors</h2>
        <div class="filter-tabs" id="awards-filters"></div>
        <div class="pub-list" id="awards-list"></div>
    </div>
</section>

<!-- Publications -->
<section id="publications" class="section section-alt">
    <div class="container">
        <h2 class="section-title">Publications</h2>
        <div class="filter-tabs" id="pub-filters"></div>
        <div class="pub-list" id="pub-list"></div>
    </div>
</section>

<!-- Blog -->
<section id="blog" class="section">
    <div class="container">
        <h2 class="section-title">Blog</h2>
        <div class="blog-grid" id="blog-grid"></div>
    </div>
</section>

<!-- Contact -->
<section id="contact" class="section section-alt">
    <div class="container">
        <h2 class="section-title">Contact</h2>
        <div class="contact-grid" id="contact-grid"></div>
    </div>
</section>

<!-- Footer -->
<footer>
    <div class="container">
        <p>&copy; 2026 Weijian Shi. All rights reserved.</p>
        <p>Powered by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a></p>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
