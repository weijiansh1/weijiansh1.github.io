<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Weijian Shi — Pixel World</title>
  <meta name="description" content="Weijian Shi's personal homepage — explore a pixel RPG world to learn about me.">
  <meta name="author" content="Weijian Shi">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Boot Screen -->
  <div id="boot-screen" class="boot-screen">
    <div id="boot-text" class="boot-text"></div>
    <div id="boot-menu" class="boot-menu hidden">
      <div class="menu-title">═══════════════════════════<br>  WEIJIAN SHI  ·  WORLD<br>═══════════════════════════</div>
      <div class="menu-items">
        <div class="menu-item selected" data-action="newgame">▶ NEW GAME</div>
        <div class="menu-item" data-action="about">  ABOUT</div>
      </div>
      <div class="menu-hint">↑↓ Select · Enter Confirm</div>
    </div>
  </div>

  <!-- Game Canvas -->
  <canvas id="game"></canvas>

  <!-- HUD: building tracker -->
  <div id="hud" class="hud hidden">
    <div class="hud-title">EXPLORE</div>
    <div id="hud-list" class="hud-list"></div>
    <div class="hud-progress"><span id="hud-count">0</span>/7</div>
  </div>

  <!-- Dialog Overlay -->
  <div id="dialog-overlay" class="dialog-overlay hidden">
    <div id="dialog-box" class="dialog-box">
      <div id="dialog-title" class="dialog-title"></div>
      <div id="dialog-content" class="dialog-content"></div>
      <div id="dialog-hint" class="dialog-hint">ESC / Tap to close</div>
    </div>
  </div>

  <!-- Interaction Prompt -->
  <div id="interact-prompt" class="interact-prompt hidden">
    <span class="prompt-key">SPACE</span> Talk / Enter
  </div>

  <!-- Mobile Controls -->
  <div id="mobile-controls" class="mobile-controls">
    <div class="dpad">
      <button class="dpad-btn dpad-up" data-dir="up">▲</button>
      <button class="dpad-btn dpad-left" data-dir="left">◀</button>
      <button class="dpad-btn dpad-right" data-dir="right">▶</button>
      <button class="dpad-btn dpad-down" data-dir="down">▼</button>
    </div>
    <button class="action-btn" id="action-a">A</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
